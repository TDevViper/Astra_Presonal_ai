# k8s/secrets.yaml — DO NOT commit real values here.
#
# Generate and apply secrets directly:
#   kubectl create secret generic astra-secrets \
#     --from-literal=JWT_SECRET_KEY="$(openssl rand -hex 32)" \
#     --from-literal=ASTRA_API_KEY="$(openssl rand -hex 16)" \
#     --from-literal=REDIS_URL="redis://redis-service:6379" \
#     --from-literal=OLLAMA_HOST="http://ollama-service:11434"
#
# For GitOps, use Sealed Secrets:
#   https://github.com/bitnami-labs/sealed-secrets
