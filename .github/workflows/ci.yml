name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install fastapi uvicorn slowapi pydantic opentelemetry-sdk opentelemetry-api opentelemetry-instrumentation-fastapi opentelemetry-exporter-otlp-proto-grpc

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check backend/ --ignore E501,F401,F811 || true

      - name: Run unit tests
        working-directory: backend
        env:
          ASTRA_API_KEY: test-key-ci
          DEFAULT_MODEL: phi3:mini
          OLLAMA_HOST: http://localhost:11434
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/eval \
            -q 2>&1

      - name: Run eval suite
        working-directory: backend
        env:
          ASTRA_API_KEY: test-key-ci
          DEFAULT_MODEL: phi3:mini
        run: |
          python -m pytest tests/eval/ -v --tb=short -q 2>&1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/.pytest_cache/

  lint-and-type:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check backend/ --ignore E501,F401,F811,E402 || true
