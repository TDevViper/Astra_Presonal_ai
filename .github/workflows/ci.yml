name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt

      - name: Download spacy model
        run: python -m spacy download en_core_web_sm

      - name: Run tests
        working-directory: backend
        env:
          REMOTE_GPU_HOST: ""
          REDIS_URL: "redis://localhost:6379"
          REDIS_HOST: ""
          SERPER_API_KEY: ""
          PICOVOICE_API_KEY: ""
          FLASK_ENV: "testing"
          OLLAMA_HOST: "http://localhost:11434"
        run: |
          PYTHONPATH=$PYTHONPATH:$(pwd) python -m pytest tests/ -v --cov=core --cov=memory --cov=api --cov=tools --cov-report=term-missing

      - name: Coverage summary
        working-directory: backend
        env:
          FLASK_ENV: "testing"
        run: |
          PYTHONPATH=$PYTHONPATH:$(pwd) python -m pytest tests/ --cov=core --cov=memory --cov=api --cov=tools --cov-report=xml