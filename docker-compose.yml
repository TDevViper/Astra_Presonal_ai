services:
  ollama:
    image: ollama/ollama:latest
    container_name: astra_ollama
    mem_limit: 10g
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: astra_redis
    mem_limit: 256m
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: astra_backend
    ports:
      - "5050:5050"
    env_file:
      - ./backend/.env
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ENABLE_SHELL_EXEC: ${ENABLE_SHELL_EXEC:-false}
      - OLLAMA_HOST=http://ollama:11434
      - REDIS_URL=redis://redis:6379
      - FLASK_ENV=production
    volumes:
      - ./backend/memory:/app/memory
      - ./backend/astra_memory.db:/app/astra_memory.db
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: astra_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: astra_jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: astra_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.0
    container_name: astra_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  ollama_data:
